<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — OlaPrestige</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Inter',sans-serif;
      background:#0A0A0A;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      text-align:center;padding:24px;
    }
    .wrap{max-width:420px;}
    img{
      width:110px;height:110px;border-radius:50%;
      border:2px solid #C9A84C;object-fit:cover;
      margin:0 auto 24px;
      box-shadow:0 0 40px rgba(201,168,76,0.3);
      animation:glow 3s ease-in-out infinite alternate;
    }
    @keyframes glow{
      from{box-shadow:0 0 20px rgba(201,168,76,0.2);}
      to{box-shadow:0 0 50px rgba(201,168,76,0.5);}
    }
    .code{
      font-family:'Cormorant Garamond',serif;
      font-size:80px;color:rgba(201,168,76,0.15);
      font-weight:700;line-height:1;margin-bottom:8px;
    }
    h1{
      font-family:'Cormorant Garamond',serif;
      font-size:26px;color:#C9A84C;
      margin-bottom:12px;font-weight:600;
    }
    p{
      color:rgba(255,255,255,0.5);
      font-size:14px;line-height:1.75;
      margin-bottom:32px;font-weight:300;
    }
    .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    a{
      display:inline-block;
      padding:12px 24px;border-radius:8px;
      font-size:14px;font-weight:600;
      text-decoration:none;transition:all 0.2s;
    }
    .btn-gold{background:#C9A84C;color:#0A0A0A;}
    .btn-gold:hover{background:#E8C97A;transform:translateY(-2px);}
    .btn-ghost{
      background:transparent;color:rgba(255,255,255,0.7);
      border:1px solid rgba(255,255,255,0.2);
    }
    .btn-ghost:hover{border-color:#C9A84C;color:#C9A84C;}
  </style>
</head>
<body>
  <div class="wrap">
    <img src="logo.png" alt="OlaPrestige">
    <div class="code">404</div>
    <h1>Page introuvable</h1>
    <p>Cette page n'existe pas ou a été déplacée.<br>Retournez à l'accueil pour découvrir nos délices.</p>
    <div class="btns">
      <a href="/" class="btn-gold">← Retour à l'accueil</a>
      <a href="/menu.html" class="btn-ghost">Voir le menu</a>
    </div>
  </div>
</body>
</html>
